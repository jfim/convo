# convo:// redirect service (nginx)
#
# Maps   https://<host>/claude-code/<slug>/<session>[#<anchor>]
# to     convo://claude-code/<slug>/<session>[#<anchor>]   (HTTP 302)
#
# Why this exists: many apps (Obsidian, chat clients, ...) refuse to make a
# custom-scheme link like convo:// clickable. A plain https:// link that
# 302-redirects into the scheme sidesteps that -- the browser does the scheme
# handoff, which it is allowed to do.
#
# Security properties (see deploy/redirect/README.md for the full rationale):
#   * The "convo://" scheme is HARDCODED. This can only ever redirect into the
#     convo handler -- it is NOT a general open redirect, so it is useless for
#     phishing to arbitrary sites.
#   * The path shape is validated; anything else 404s, so the domain cannot be
#     used as an arbitrary convo:// emitter.
#   * access_log is OFF: the path contains other people's project slugs and
#     session ids, which are not ours to record.
#
# ---------------------------------------------------------------------------
# This rate-limit zone must live in the http { } context (e.g. nginx.conf),
# NOT inside server { }. Uncomment it there:
#
#   limit_req_zone $binary_remote_addr zone=convo:1m rate=10r/s;
# ---------------------------------------------------------------------------

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name convo.example.com;            # <-- your hostname

    # TLS -- point these at your certificate (a *.example.com wildcard is fine).
    ssl_certificate     /etc/ssl/certs/convo.example.com.pem;
    ssl_certificate_key /etc/ssl/private/convo.example.com.key;

    # Privacy: do not record visitors' slugs / session ids.
    access_log off;

    # Never leak the full URL (with session id) to a third party via Referer.
    add_header Referrer-Policy "no-referrer" always;

    # Basic flood protection (requires the limit_req_zone above).
    limit_req zone=convo burst=20 nodelay;

    # Match exactly /claude-code/<slug>/<uuid>:
    #   slug = project name as derived by the convo plugin hook (cwd with
    #          '/' and '.' replaced by '-'), so [A-Za-z0-9_-].
    #   uuid = canonical 8-4-4-4-12 session id.
    # nginx normalizes any ".." in the path away before this match, and the
    # convo handler independently rejects traversal -- defense in depth.
    location ~ "^/claude-code/[A-Za-z0-9_-]+/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$" {
        # Redirects are GET-only. limit_except is a location directive, so it
        # lives here rather than in the server block.
        limit_except GET { deny all; }

        # $uri is the normalized path (no query string). It begins with a
        # leading '/', so "convo:/" + $uri yields "convo://claude-code/...".
        return 302 "convo:/$uri";
    }

    # Anything that is not a well-formed convo link.
    location / {
        return 404;
    }
}
